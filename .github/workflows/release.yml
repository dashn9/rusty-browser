name: Release Deploy

on:
  workflow_dispatch:
    inputs:
      packages:
        description: 'Packages to release (comma-separated)'
        type: string
        required: true
        default: 'rusty-agent,rusty-server'
      force_agent:
        description: 'Force release for rusty-agent'
        type: boolean
        required: false
        default: false
      force_server:
        description: 'Force release for rusty-server'
        type: boolean
        required: false
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  release_agent:
    name: Release rusty-agent
    runs-on: ubuntu-22.04
    if: contains(inputs.packages, 'rusty-agent')
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Version
        id: version
        run: |
          VERSION=$(grep '^version = ' rusty-agent/Cargo.toml | head -1 | cut -d '"' -f 2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check Existing Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if gh release view "v$VERSION" > /dev/null 2>&1; then
            echo "Release v$VERSION already exists."
            if [ "${{ inputs.force_agent }}" == "false" ]; then
              echo "Force is false. Aborting."
              exit 1
            fi
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-agent-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev protobuf-compiler

      - name: Build
        run: cargo build --release -p rusty-agent

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: target/release/rusty-agent
          draft: false
          prerelease: false
          generate_release_notes: false

  release_agent_windows:
    name: Release rusty-agent (Windows)
    runs-on: windows-latest
    if: contains(inputs.packages, 'rusty-agent')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Version
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version = ' rusty-agent/Cargo.toml | head -1 | cut -d '"' -f 2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-agent-${{ hashFiles('**/Cargo.lock') }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: cargo build --release -p rusty-agent

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: target/release/rusty-agent.exe
          draft: false
          prerelease: false
          generate_release_notes: false

  release_server:
    name: Release rusty-server
    runs-on: ubuntu-22.04
    if: contains(inputs.packages, 'rusty-server')
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Version
        id: version
        run: |
          VERSION=$(grep '^version = ' rusty-server/Cargo.toml | head -1 | cut -d '"' -f 2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check Existing Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if gh release view "v$VERSION" > /dev/null 2>&1; then
            echo "Release v$VERSION already exists."
            if [ "${{ inputs.force_server }}" == "false" ]; then
              echo "Force is false. Aborting."
              exit 1
            fi
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-server-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev protobuf-compiler

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build
        run: cargo build --release -p rusty-server

      - name: Package
        run: |
          cargo deb --no-build -p rusty-server
          mv target/debian/rusty-server_*_amd64.deb target/debian/rusty-server_amd64.deb

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: target/debian/rusty-server_amd64.deb
          draft: false
          prerelease: false
          generate_release_notes: false

name: Release Deploy

on:
  workflow_dispatch:
    inputs:
      packages:
        description: 'Packages to release (comma-separated)'
        type: string
        required: true
        default: 'rustmani-agent,rustmani-server'
      force_agent:
        description: 'Force release for rustmani-agent'
        type: boolean
        required: false
        default: false
      force_server:
        description: 'Force release for rustmani-server'
        type: boolean
        required: false
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  release_agent:
    name: Release rustmani-agent
    runs-on: ubuntu-22.04
    if: contains(inputs.packages, 'rustmani-agent')
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Version
        id: version
        run: |
          VERSION=$(grep '^version = ' rustmani-agent/Cargo.toml | head -1 | cut -d '"' -f 2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check Existing Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if gh release view "v$VERSION" > /dev/null 2>&1; then
            echo "Release v$VERSION already exists."
            if [ "${{ inputs.force_agent }}" == "false" ]; then
              echo "Force is false. Aborting."
              exit 1
            fi
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-agent-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev protobuf-compiler

      - name: Build
        run: cargo build --release -p rustmani-agent

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: target/release/rustmani-agent
          draft: false
          prerelease: false
          generate_release_notes: false

  release_server:
    name: Release rustmani-server
    runs-on: ubuntu-22.04
    if: contains(inputs.packages, 'rustmani-server')
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Version
        id: version
        run: |
          VERSION=$(grep '^version = ' rustmani-server/Cargo.toml | head -1 | cut -d '"' -f 2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check Existing Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if gh release view "v$VERSION" > /dev/null 2>&1; then
            echo "Release v$VERSION already exists."
            if [ "${{ inputs.force_server }}" == "false" ]; then
              echo "Force is false. Aborting."
              exit 1
            fi
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-server-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev protobuf-compiler

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build
        run: cargo build --release -p rustmani-server

      - name: Package
        run: |
          cargo deb --no-build -p rustmani-server
          mv target/debian/rustmani-server_*_amd64.deb target/debian/rustmani-server_amd64.deb

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: target/debian/rustmani-server_amd64.deb
          draft: false
          prerelease: false
          generate_release_notes: false

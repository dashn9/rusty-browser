syntax = "proto3";
package rustmani;

// Master connects directly to each browser agent.
service BrowserAgent {
  rpc Execute(BrowserCommand) returns (CommandResult);
}

// Agent calls master on startup to store connection info and signal liveness.
// Server streams back keep-alives; stream close = agent gone.
service Master {
  rpc Register(RegisterAgentRequest) returns (stream ConnectEvent);
}

message RegisterAgentRequest {
  string execution_id = 1;
  string browser_id   = 2;
  string host         = 3;
  uint32 grpc_port    = 4;
}

// Heartbeat from server. terminate=true means server wants agent to shut down.
message ConnectEvent {
  bool terminate = 1;
}

message CommandResult {
  bool success = 1;
  string error_message = 2;
  optional ScreenshotData screenshot = 3;
}

message ScreenshotData {
  bytes data = 1;
  uint32 width = 2;
  uint32 height = 3;
}

message BrowserCommand {
  string browser_id = 1;
  string context_id = 2;
  oneof action {
    Navigate navigate = 11;
    Click click = 12;
    Type type_text = 13;
    MouseMove mouse_move = 14;
    HumanMouseMove human_mouse_move = 15;
    CreateContext create_context = 16;
    CloseContext close_context = 17;
    CloseBrowser close_browser = 18;
    EvalJs eval_js = 19;
    FindNode find_node = 20;
    WaitForNode wait_for_node = 21;
    Screenshot screenshot = 23;
    Scroll scroll = 24;
  }
}

message CreateContext {
  optional string url = 1;
}

message Screenshot {
  uint32 quality = 1;
  string format = 2;
}

message Navigate {
  string url = 1;
  string wait_until = 2;
}

message Click {
  optional string selector = 1;
  optional float x = 2;
  optional float y = 3;
  bool human = 4;
}

message Type {
  string text = 1;
  optional string selector = 2;
}

// Moves to selector instead if present
message MouseMove {
  optional float x = 1;
  optional float y = 2;
  uint32 steps = 3;
  optional string selector = 4;
}

// Moves to selector instead if present
message HumanMouseMove {
  optional string selector = 1;
  optional float x = 2;
  optional float y = 3;
}

message CloseContext {
  string context_id = 1;
}

message CloseBrowser {}

message EvalJs {
  string script = 1;
}

message FindNode {
  string selector = 1;
}

message WaitForNode {
  string selector = 1;
  uint64 timeout_ms = 2;
}

message Scroll {
  float delta_x = 1;
  float delta_y = 2;
}
